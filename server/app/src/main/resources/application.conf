server {
  # host:port that the embedded server listens on. Override the host part with OPENGB_HOST_PORT or
  # just override the port via OPENGB_PORT (preserved for Fly.io's internal_port convention).
  hostPort = "0.0.0.0:8080"
  hostPort = ${?OPENGB_HOST_PORT}
  publicBaseUrl = "http://localhost:8080"
  publicBaseUrl = ${?OPENGB_PUBLIC_BASE_URL}
  # Canonical marketing host. Anything in `redirectFrom` 301s here. Self-hosters: unset
  # (or override via OPENGB_CANONICAL_HOST) to disable the redirect entirely.
  canonicalHost = "opengreenbutton.org"
  canonicalHost = ${?OPENGB_CANONICAL_HOST}
  redirectFrom = ["www.opengreenbutton.org"]
}

crypto {
  # 32-byte AES-GCM key, base64-encoded. MUST be overridden in production via OPENGB_CRYPTO_AESKEYBASE64.
  # This default is a placeholder that is intentionally well-known and unsafe.
  aesKeyBase64 = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
  aesKeyBase64 = ${?OPENGB_CRYPTO_AESKEYBASE64}
  hmacPepperBase64 = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
  hmacPepperBase64 = ${?OPENGB_CRYPTO_HMACPEPPERBASE64}
}

state {
  oauthStateTtlSeconds = 600
  claimCodeTtlSeconds = 600
  requestLogPerClient = 50
}

landing {
  tagline = "Open Green Button — bridge utility energy data into Home Assistant."
}
