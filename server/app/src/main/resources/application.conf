server {
  # host:port that the embedded server listens on. Override the host part with OPENGB_HOST_PORT or
  # just override the port via OPENGB_PORT (preserved for Fly.io's internal_port convention).
  hostPort = "0.0.0.0:8080"
  hostPort = ${?OPENGB_HOST_PORT}
  publicBaseUrl = "http://localhost:8080"
  publicBaseUrl = ${?OPENGB_PUBLIC_BASE_URL}
  # Canonical marketing host. Anything in `redirectFrom` 301s here. Self-hosters: unset
  # (or override via OPENGB_CANONICAL_HOST) to disable the redirect entirely.
  canonicalHost = "opengreenbutton.org"
  canonicalHost = ${?OPENGB_CANONICAL_HOST}
  redirectFrom = ["www.opengreenbutton.org"]
}

crypto {
  # 32-byte AES-GCM key, base64-encoded. MUST be overridden in production via OPENGB_CRYPTO_AESKEYBASE64.
  # This default is a placeholder that is intentionally well-known and unsafe.
  aesKeyBase64 = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
  aesKeyBase64 = ${?OPENGB_CRYPTO_AESKEYBASE64}
  hmacPepperBase64 = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
  hmacPepperBase64 = ${?OPENGB_CRYPTO_HMACPEPPERBASE64}
}

state {
  oauthStateTtlSeconds = 600
  claimCodeTtlSeconds = 600
  requestLogPerClient = 50
}

# Default TLS client authentication (mTLS). The private key + self-signed client certificate we
# present to utility endpoints so they can validate our connection. This block is NOT utility-
# specific — it applies to every utility that doesn't define its own `clientAuth` override in
# utilities.conf, which then falls back here.
#
# The keystore never lives in the repo. It's a PKCS12 (preferred) or JKS keystore, base64-encoded
# (binary can't survive an env var) and injected via a Fly secret:
#
#   OPENGB_CLIENTAUTH_KEYSTOREBASE64    base64 of the .p12 bytes
#   OPENGB_CLIENTAUTH_KEYSTOREPASSWORD  the keystore/key password
#
# When OPENGB_CLIENTAUTH_KEYSTOREBASE64 is unset this block carries no material and mTLS is simply
# off — the client connects with ordinary one-way TLS. See config/ClientAuthConfig.kt.
clientAuth {
  keystoreBase64 = ${?OPENGB_CLIENTAUTH_KEYSTOREBASE64}
  keystorePassword = ${?OPENGB_CLIENTAUTH_KEYSTOREPASSWORD}
  # keystoreType defaults to PKCS12; set to "JKS" if you exported a JKS instead.
  keystoreType = "PKCS12"
  keystoreType = ${?OPENGB_CLIENTAUTH_KEYSTORETYPE}
  # keyAlias / keyPassword are only needed for multi-entry keystores or a separately-encrypted key.
  keyAlias = ${?OPENGB_CLIENTAUTH_KEYALIAS}
  keyPassword = ${?OPENGB_CLIENTAUTH_KEYPASSWORD}
}

landing {
  tagline = "Open Green Button — bridge utility energy data into Home Assistant."
}
