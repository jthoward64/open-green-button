# Per-utility profiles. Endpoint URLs and clientId live in this file; the clientSecret comes
# from an env var (`fly secrets set` in prod, `.env` for local dev) keyed on the utility id.
#
# To add a utility:
#   1. Add a new entry in the `utilities` array.
#   2. Set the OPENGB_UTILITY_<ID>_CLIENTSECRET env var.
#   3. Restart the server. (Or for Fly, `fly deploy`.)
#
# defaultScope format reference: https://github.com/green-button/green-button.github.io/blob/master/espi/authorization_scope.md
#
# Our scope can request both auth styles (FB_14 legacy, FB_31 modern) when utilities differ
# on which side of the upgrade they're on. The utility grants whichever it supports; the
# *granted* scope (which may be a subset) comes back in the token response and is what we
# persist. See RefreshBlob construction in routes/Connect.kt for the dual-style handling.
#
# Format params we tack onto every scope string:
#   IntervalDuration  900_3600  accept both 15-min and 1-hr readings; utility serves whichever
#   BlockDuration     Monthly   billing-aligned aggregates
#   HistoryLength     94608000  36 months — asks the *utility* how much history to authorize
#   SubscriptionFrequency  Daily  daily push notifications
#   AccountCollection 5         covers elec + gas + water + spare
#
# `initialHistory` (per-utility, below) is a separate, client-facing knob: how far back the Home
# Assistant client backfills `published-min` on the *first* fetch. Expressed human-friendly —
# `2y`, `6m`, `90d` (units: d/w/m/y; m=30d, y=365d). It's surfaced to the client in the claim
# response (as seconds) and is the single source of truth for the backfill window. The scope
# `HistoryLength` above is the utility-facing analogue; the two normally agree, but for the
# test-lab harness the scope value isn't accepted, so `initialHistory` is the effective control.

utilities = [
  {
    # Burlington Hydro — PRODUCTION.
    #
    # Promoted to production 2026-07-02. The endpoints below are Burlington's live
    # `greenbutton.burlingtonhydro.com` host. Previously we ran against the Green Button
    # Alliance certification harness (operated by London Hydro at greenbuttontestlab.ca) for
    # the OAuth technical demo; the utility id `burlington_hydro`, the client `opengreenbutton`,
    # and the redirect URI (.../connect/burlington_hydro/callback) all carried over unchanged,
    # so only authorizeUrl / tokenUrl swapped and the Fly secret was rotated to the prod value.
    #
    # The prod clientSecret is injected via the env/Fly secret
    # OPENGB_UTILITY_BURLINGTON_HYDRO_CLIENTSECRET (see line below) — never committed here.
    #
    # Scope is exactly what Burlington provisioned in the promotion email — the bare FB list,
    # no `IntervalDuration=900_3600;BlockDuration=Monthly;HistoryLength=94608000;
    # SubscriptionFrequency=Daily;AccountCollection=5` preferences. The cert harness rejected
    # those with `invalid_scope` and the prod endpoint was issued the same trimmed list, so we
    # keep it as-is. See the function-block diff in the project notes for how this list relates
    # to our original wishlist (trimmed of gas/water/multi-meter, broadened with
    # customer/account/billing blocks 53–69).
    id = "burlington_hydro"
    displayName = "Burlington Hydro"
    authorizeUrl = "https://greenbutton.burlingtonhydro.com/oauth/authorize"
    tokenUrl = "https://greenbutton.burlingtonhydro.com/oauth/token"
    clientId = "opengreenbutton"
    clientSecret = "placeholder"
    clientSecret = ${?OPENGB_UTILITY_BURLINGTON_HYDRO_CLIENTSECRET}
    defaultScope = "FB=1_3_4_5_13_15_16_28_31_37_39_51_53_54_55_56_57_58_59_60_61_64_65_68_69"
    # Two years of backfill on first auth. Bounded to keep the initial pull manageable; bump
    # per-utility if a provider both retains and will serve more.
    initialHistory = "2y"
    notificationPath = "/notify/burlington_hydro"
    tokenAuthStyle = "HTTP_BASIC"
  }
  {
    # London Hydro Green Button Test Lab.
    #
    # The London Hydro certification harness at greenbuttontestlab.ca.
    # Kept as a permanent, non-production entry so we — and users who
    # have the HA integration installed but no working utility connection yet — can exercise the
    # full OAuth + first-fetch flow end to end against the sandbox.
    #
    # clientId `opengreenbutton` / secret are the harness credentials; the secret lives in the
    # OPENGB_UTILITY_LONDON_HYDRO_GBTESTLAB_CLIENTSECRET env/Fly secret — never committed here.
    #
    # Scope is the bare FB list the harness whitelists — extra IntervalDuration/HistoryLength/etc.
    # preferences come back `invalid_scope` (see burlington_hydro above).
    id = "london_hydro_gbtestlab"
    displayName = "London Hydro Green Button Test Lab"
    authorizeUrl = "https://www.greenbuttontestlab.ca/oauth/authorize"
    tokenUrl = "https://www.greenbuttontestlab.ca/oauth/token"
    clientId = "opengreenbutton"
    clientSecret = "placeholder"
    clientSecret = ${?OPENGB_UTILITY_LONDON_HYDRO_GBTESTLAB_CLIENTSECRET}
    defaultScope = "FB=1_3_4_5_13_15_16_28_31_37_39_51_53_54_55_56_57_58_59_60_61_64_65_68_69"
    initialHistory = "2y"
    notificationPath = "/notify/london_hydro_gbtestlab"
    tokenAuthStyle = "HTTP_BASIC"
  }

  # ---------------------------------------------------------------------------------------------
  # PG&E (Pacific Gas & Electric) — Share My Data. NOT YET LIVE.
  #
  # PG&E's Third Party registration collects a `thirdPartyScopeSelectionScreenURI` (the "Third
  # Party Scope Selection URI"): the screen a custodian sends the customer to, during a
  # custodian-initiated OAuth flow, to confirm what they'll share. We serve that at
  #   https://<publicBaseUrl>/connect/pge/scope         (handled by routes/Connect.kt)
  # Also give PG&E on the same form:
  #   redirect_uri  = https://<publicBaseUrl>/connect/pge/callback
  #   thirdPartyNotifyUri = https://<publicBaseUrl>/notify/pge
  #
  # To activate: fill in PG&E's sandbox (then production) authorize/token URLs and the client_id
  # they issue, set OPENGB_UTILITY_PGE_CLIENTSECRET (Fly secret / .env), uncomment, and deploy.
  # Start against PG&E's sandbox; flip the URLs to production only after certification. Confirm
  # PG&E accepts this defaultScope (their sandbox may reject the extended format params, exactly
  # like the Burlington/London harnesses did — trim to the bare FB list if so).
  #
  # {
  #   id = "pge"
  #   displayName = "PG&E"
  #   authorizeUrl = "https://api.pge.com/.../oauth/authorize"   # TODO: real PG&E sandbox URL
  #   tokenUrl     = "https://api.pge.com/.../oauth/token"       # TODO: real PG&E sandbox URL
  #   clientId = "TODO_PGE_CLIENT_ID"
  #   clientSecret = "placeholder"
  #   clientSecret = ${?OPENGB_UTILITY_PGE_CLIENTSECRET}
  #   defaultScope = "FB=1_3_4_5_13_15_16_28_31_37_39_51_53_54_55_56_57_58_59_60_61_64_65_68_69"
  #   initialHistory = "2y"
  #   notificationPath = "/notify/pge"
  #   tokenAuthStyle = "HTTP_BASIC"
  # }
]
