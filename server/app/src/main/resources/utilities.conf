# Per-utility profiles. Endpoint URLs and clientId live in this file; the clientSecret comes
# from an env var (`fly secrets set` in prod, `.env` for local dev) keyed on the utility id.
#
# To add a utility:
#   1. Add a new entry in the `utilities` array.
#   2. Set the OPENGB_UTILITY_<ID>_CLIENTSECRET env var.
#   3. Restart the server. (Or for Fly, `fly deploy`.)
#
# defaultScope format reference: https://github.com/green-button/green-button.github.io/blob/master/espi/authorization_scope.md
#
# Our scope can request both auth styles (FB_14 legacy, FB_31 modern) when utilities differ
# on which side of the upgrade they're on. The utility grants whichever it supports; the
# *granted* scope (which may be a subset) comes back in the token response and is what we
# persist. See RefreshBlob construction in routes/Connect.kt for the dual-style handling.
#
# Format params we tack onto every scope string:
#   IntervalDuration  900_3600  accept both 15-min and 1-hr readings; utility serves whichever
#   BlockDuration     Monthly   billing-aligned aggregates
#   HistoryLength     94608000  36 months — asks the *utility* how much history to authorize
#   SubscriptionFrequency  Daily  daily push notifications
#   AccountCollection 5         covers elec + gas + water + spare
#
# published-min/max wire format: the ESPI resource GET sends these query params as **Unix epoch
# seconds** by default (the NAESB/OpenESPI standard — e.g. savagedata requires it and rejects ISO
# 8601 with an empty-body 400). London Hydro's Green Button platform is non-standard and instead
# requires ISO 8601 — every utility on it (Burlington today; the commented London Hydro / NPE / and
# the six "More London-Hydro-operated" templates below) must set `quirks { iso8601PublishedParams = true }`.
#
# TLS client authentication (mTLS): the default cert lives in application.conf's `clientAuth` block
# and is used for every utility here. A utility with different requirements (e.g. a cert the utility
# issues rather than our self-signed default) can override it with its own `clientAuth` block —
# same shape, backed by its own env/Fly secret — which takes precedence over the default. See the
# PG&E template below for the syntax.
#
# `initialHistory` (per-utility, below) is a separate, client-facing knob: how far back the Home
# Assistant client backfills `published-min` on the *first* fetch. Expressed human-friendly —
# `2y`, `6m`, `90d` (units: d/w/m/y; m=30d, y=365d). It's surfaced to the client in the claim
# response (as seconds) and is the single source of truth for the backfill window. The scope
# `HistoryLength` above is the utility-facing analogue; the two normally agree, but for the
# test-lab harness the scope value isn't accepted, so `initialHistory` is the effective control.

utilities = [
  {
    # Burlington Hydro — PRODUCTION.
    #
    # Promoted to production 2026-07-02. The endpoints below are Burlington's live
    # `greenbutton.burlingtonhydro.com` host. Previously we ran against the Green Button
    # Alliance certification harness (operated by London Hydro at greenbuttontestlab.ca) for
    # the OAuth technical demo; the utility id `burlington_hydro`, the client `opengreenbutton`,
    # and the redirect URI (.../connect/burlington_hydro/callback) all carried over unchanged,
    # so only authorizeUrl / tokenUrl swapped and the Fly secret was rotated to the prod value.
    #
    # The prod clientSecret is injected via the env/Fly secret
    # OPENGB_UTILITY_BURLINGTON_HYDRO_CLIENTSECRET (see line below) — never committed here.
    #
    # Scope is exactly what Burlington provisioned in the promotion email — the bare FB list,
    # no `IntervalDuration=900_3600;BlockDuration=Monthly;HistoryLength=94608000;
    # SubscriptionFrequency=Daily;AccountCollection=5` preferences. The cert harness rejected
    # those with `invalid_scope` and the prod endpoint was issued the same trimmed list, so we
    # keep it as-is. See the function-block diff in the project notes for how this list relates
    # to our original wishlist (trimmed of gas/water/multi-meter, broadened with
    # customer/account/billing blocks 53–69).
    id = "burlington_hydro"
    displayName = "Burlington Hydro"
    authorizeUrl = "https://greenbutton.burlingtonhydro.com/oauth/authorize"
    tokenUrl = "https://greenbutton.burlingtonhydro.com/oauth/token"
    clientId = "opengreenbutton"
    clientSecret = "placeholder"
    clientSecret = ${?OPENGB_UTILITY_BURLINGTON_HYDRO_CLIENTSECRET}
    defaultScope = "FB=1_3_4_5_13_15_16_28_31_37_39_51_53_54_55_56_57_58_59_60_61_64_65_68_69"
    # Two years of backfill on first auth. Bounded to keep the initial pull manageable; bump
    # per-utility if a provider both retains and will serve more.
    initialHistory = "2y"
    notificationPath = "/notify/burlington_hydro"
    tokenAuthStyle = "HTTP_BASIC"

    # Burlington runs on London Hydro's Green Button platform, whose resource server is non-standard:
    # it wants published-min/max as ISO 8601, not the default (NAESB-standard) Unix epoch seconds.
    quirks {
      iso8601PublishedParams = true
    }
  }
  # ---------------------------------------------------------------------------------------------
  # Milton Hydro — savagedata sandbox Data Custodian. CERTIFICATION SANDBOX (not production).
  #
  # This is the NAESB ESPI 3.3 "Connect My Data" certification against savagedata's sandbox DC
  # (sandboxdc.savagedata.com). Unlike every other utility here, its credentials were NOT hand-
  # entered: they were issued via ESPI 3.3 dynamic client registration and pulled with the
  # onboarding driver (`./gradlew :app:onboardFetchAppInfo --args="milton_hydro"`) from the
  # ApplicationInformation resource the DC pushed to /notify/milton_hydro. All values below
  # (endpoints, clientId, scope) are copied verbatim from that resource.
  #
  # Like the London Hydro test lab, this is temporary — comment it out once certification is done.
  # While enabled it shows a "Connect" card on the public landing page (generated from this array).
  #
  # mTLS is REQUIRED and uses a DIFFERENT cert than the default self-signed `clientAuth` in
  # application.conf: savagedata only accepts a non-self-signed leaf certificate, so this entry
  # carries its own `clientAuth` override (env-injected keystore, same shape as the PG&E template).
  #
  # Secrets (never committed) — set both before deploy:
  #   OPENGB_UTILITY_MILTON_HYDRO_CLIENTSECRET                  = LDgQ…  (the client_secret from the
  #     ApplicationInformation; NOTE the sandbox secret expires ~2026-09-05 — re-run the driver to
  #     refresh it if certification runs long)
  #   OPENGB_UTILITY_MILTON_HYDRO_CLIENTAUTH_KEYSTOREBASE64     = base64 of the leaf-cert PKCS12
  #   OPENGB_UTILITY_MILTON_HYDRO_CLIENTAUTH_KEYSTOREPASSWORD   = its keystore password
  #
  # Already registered with the DC (from the ApplicationInformation): redirect_uri
  # https://api.opengreenbutton.org/connect/milton_hydro/callback and thirdPartyNotifyUri
  # https://api.opengreenbutton.org/notify/milton_hydro — both must stay reachable in prod.
  {
    id = "milton_hydro"
    # SANDBOX-tagged display name so any visitor who sees the landing card during certification
    # knows not to use it. Revert (or comment the whole entry out) once cert is done.
    displayName = "Milton Hydro (SANDBOX for testing only)"
    authorizeUrl = "https://sandboxdc.savagedata.com:4243/connect/authorize"
    tokenUrl = "https://sandboxdc.savagedata.com:4243/connect/token"
    clientId = "12cc85f5-896d-4851-a359-d3698dbcf52b"
    clientSecret = "placeholder"
    clientSecret = ${?OPENGB_UTILITY_MILTON_HYDRO_CLIENTSECRET}
    # Exactly the scope savagedata registered for this app (they accept the SubscriptionFrequency
    # format param — unlike the London Hydro harnesses, so it's kept here verbatim).
    defaultScope = "FB=1_3_4_5_6_7_8_9_12_15_16_17_27_28_35_36_37_40_51_54_55_56_57_58_59_60_61;SubscriptionFrequency=Daily"
    initialHistory = "2y"
    notificationPath = "/notify/milton_hydro"
    tokenAuthStyle = "HTTP_BASIC"

    # Per-utility mTLS override — the non-self-signed leaf cert savagedata requires.
    clientAuth {
      keystoreBase64 = ${?OPENGB_UTILITY_MILTON_HYDRO_CLIENTAUTH_KEYSTOREBASE64}
      keystorePassword = ${?OPENGB_UTILITY_MILTON_HYDRO_CLIENTAUTH_KEYSTOREPASSWORD}
    }
  }
