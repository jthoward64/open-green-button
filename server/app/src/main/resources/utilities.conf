# Per-utility profiles. Secrets are pulled from environment variables and must be set
# via `fly secrets set` (or a `.env` file for local dev).
#
# To add a utility:
#   1. Add a new entry in the `utilities` array.
#   2. Set the OPENGB_UTILITY_<ID>_CLIENTID and _CLIENTSECRET env vars.
#   3. Restart the server. (Or for Fly, `fly deploy`.)
#
# defaultScope format reference: https://github.com/green-button/green-button.github.io/blob/master/espi/authorization_scope.md
#
# Our scope requests both auth styles (FB_14 legacy, FB_31 modern) so utilities on either side
# of the upgrade work. The utility grants whichever they support; the *granted* scope (which
# may be a subset) is what comes back in the token response and what we persist. See
# RefreshBlob construction in routes/Connect.kt for the dual-style handling.
#
# Function blocks requested:
#   Infrastructure       1 Common, 3 Connect My Data, 13 Security/Privacy, 14 Legacy auth, 31 Modern auth
#   Electricity          4 Interval (generic), 5 Interval Electricity, 7 Net Metering, 8 Fwd/Rev Metering
#   Other fuels         10 Gas, 11 Water
#   Billing             15 Usage Summary, 16 Usage Summary with Cost
#   Multi-meter         18 Multiple Usage Points
#   Updates             19 Partial Update Data, 39 PUSH Model (NotificationURI)
#   REST endpoints      32 Resource Level REST, 37 Query Parameters (`since=` filtering)
#   Bulk                35 REST for Bulk
#   Customer ref        51 Retail Customer Common (lets utility match auth to a customer record)
#
# Other params:
#   IntervalDuration  900_3600  accept both 15-min and 1-hr readings; utility serves whichever
#   BlockDuration     Monthly   billing-aligned aggregates
#   HistoryLength     94608000  36 months — maximizes backfill on first auth
#   SubscriptionFrequency  Daily  daily push notifications
#   AccountCollection 5         covers elec + gas + water + spare

utilities = [
  {
    # Green Button Alliance certification harness, operated by London Hydro at
    # greenbuttontestlab.ca. This is what Burlington Hydro (and presumably any other Ontario
    # utility we onboard) points integrators at for the technical demo before provisioning
    # real production credentials.
    #
    # The displayName surfaces in the HA integration's utility dropdown, so keep it
    # recognizable to a tester. The clientId "opengreenbutton" was assigned by the harness —
    # not secret. The clientSecret is set via OPENGB_UTILITY_LONDON_HYDRO_GBTESTLAB_CLIENTSECRET
    # (Fly secret).
    #
    # The harness also issues two client_credentials tokens for dynamic registration / admin
    # operations (REGISTRATION_opengreenbutton, opengreenbutton_admin) — not used by the
    # user-facing OAuth flow, so they're stored outside this repo.
    #
    # End-user TestLab login (username/password the *tester* types at the consent page) is an
    # upstream credential too — we never see or store it.
    id = "london_hydro_gbtestlab"
    displayName = "Green Button Test Lab"
    authorizeUrl = "https://www.greenbuttontestlab.ca/oauth/authorize"
    tokenUrl = "https://www.greenbuttontestlab.ca/oauth/token"
    clientId = "opengreenbutton"
    clientSecret = "placeholder"
    clientSecret = ${?OPENGB_UTILITY_LONDON_HYDRO_GBTESTLAB_CLIENTSECRET}
    # Scope dictated by the harness — see the function-block diff in the project notes for how
    # it relates to our original wishlist (trimmed of gas/water/multi-meter, broadened with
    # customer/account/billing blocks 53–69). The IntervalDuration / BlockDuration / etc. are
    # our format preferences, which the harness either honors or quietly ignores.
    defaultScope = "FB=1_3_4_5_13_15_16_28_31_37_39_51_53_54_55_56_57_58_59_60_61_64_65_68_69;IntervalDuration=900_3600;BlockDuration=Monthly;HistoryLength=94608000;SubscriptionFrequency=Daily;AccountCollection=5"
    notificationPath = "/notify/london_hydro_gbtestlab"
    tokenAuthStyle = "HTTP_BASIC"
  },
  {
    # Burlington Hydro production endpoints — placeholder until they provision us after the
    # test-lab demo passes. The `gb.burlingtonhydro.com` host is a guess and does not resolve.
    id = "burlington_hydro"
    displayName = "Burlington Hydro"
    authorizeUrl = "https://gb.burlingtonhydro.com/oauth/authorize"
    authorizeUrl = ${?OPENGB_UTILITY_BURLINGTON_HYDRO_AUTHORIZEURL}
    tokenUrl = "https://gb.burlingtonhydro.com/oauth/token"
    tokenUrl = ${?OPENGB_UTILITY_BURLINGTON_HYDRO_TOKENURL}
    clientId = "placeholder"
    clientId = ${?OPENGB_UTILITY_BURLINGTON_HYDRO_CLIENTID}
    clientSecret = "placeholder"
    clientSecret = ${?OPENGB_UTILITY_BURLINGTON_HYDRO_CLIENTSECRET}
    defaultScope = "FB=1_3_4_5_7_8_10_11_13_14_15_16_18_19_31_32_35_37_39_51;IntervalDuration=900_3600;BlockDuration=Monthly;HistoryLength=94608000;SubscriptionFrequency=Daily;AccountCollection=5"
    notificationPath = "/notify/burlington_hydro"
    tokenAuthStyle = "HTTP_BASIC"
  }
]
