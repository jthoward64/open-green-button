# fly.toml app configuration file generated for open-green-button on 2026-05-22T15:58:58-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'open-green-button'
primary_region = 'yyz'

[env]
  OPENGB_HOST_PORT = '0.0.0.0:8080'
  OPENGB_LANDING_MODE = 'COMING_SOON'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[metrics]]
  port = 8080
  path = '/metrics'
