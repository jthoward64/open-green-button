# Fly.io deploy config for the Open Green Button proxy server.
#
# Bootstrap:
#   fly launch --no-deploy --copy-config --name open-green-button --region yyz
#   fly secrets set \
#     OPENGB_CRYPTO_AESKEYBASE64=$(openssl rand -base64 32) \
#     OPENGB_CRYPTO_HMACPEPPERBASE64=$(openssl rand -base64 32)
#   fly certs add greenbutton.<your-domain>
#   ./gradlew :app:jib --image=registry.fly.io/open-green-button:latest
#   fly deploy --image registry.fly.io/open-green-button:latest

app = "open-green-button"
primary_region = "yyz"

[build]
  # Image is built by `./gradlew :app:jib` and pushed to a registry; fly deploy --image=...
  # No Dockerfile here.

[env]
  OPENGB_HOST_PORT = "0.0.0.0:8080"
  OPENGB_LANDING_MODE = "COMING_SOON"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

[metrics]
  port = 8080
  path = "/metrics"
