name: deploy

on:
  push:
    branches: [master]
    paths:
      - 'server/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Serialize deploys: a second push that lands while one deploy is running waits
# rather than racing for Fly's deploy lock. cancel-in-progress=false → newer run
# queues behind in-flight, doesn't kill it (kills risk leaving the app in a
# half-released state).
concurrency:
  group: fly-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Don't deploy a broken build. `build` runs `check` which runs `test`.
      - name: Build & test
        run: ./gradlew build

      - name: Authenticate Docker for Fly registry
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Push image with Jib
        # Tags: registry.fly.io/open-green-button:<sha> and :latest. We deploy
        # by SHA below so the deployed image is immutable; :latest is a
        # convenience for manual `fly deploy` runs.
        run: |
          ./gradlew :app:jib \
            -Popengb.image.name=registry.fly.io/open-green-button \
            -Popengb.version=${{ github.sha }}

      - name: Deploy to Fly
        run: |
          flyctl deploy \
            --app open-green-button \
            --image registry.fly.io/open-green-button:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Summarize
        if: success()
        run: |
          echo "### Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`registry.fly.io/open-green-button:${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- App: https://fly.io/apps/open-green-button" >> "$GITHUB_STEP_SUMMARY"
