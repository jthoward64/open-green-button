name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  server-image:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '24'

      - uses: gradle/actions/setup-gradle@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image with Jib
        env:
          OPENGB_VERSION: ${{ github.ref_name }}
        run: |
          ./gradlew :app:jib \
            -Popengb.version="${OPENGB_VERSION#v}" \
            -Popengb.image.name="ghcr.io/${{ github.repository_owner }}/open-green-button-server"

  github-release:
    needs: server-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
