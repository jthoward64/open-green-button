# Detekt overrides on top of the default ruleset. Anything not listed here uses detekt's
# defaults from io.gitlab.arturbosch.detekt.api.internal.DefaultRuleSetProvider.
#
# Pattern lifted from domains-registry-gateway/config/detekt.yml, adapted for open-green-button.

complexity:
  TooManyFunctions:
    # 11 (default) is too low for typical Ktor route / DI module files. Same goes for files
    # built out of many small kotlinx.html section helpers (the landing page).
    thresholdInClasses: 15
    thresholdInFiles: 20
    ignoreDeprecated: true

exceptions:
  InstanceOfCheckForException:
    # Allowed — we do catch (e: javax.crypto.AEADBadTagException) etc. and wrap, which is a
    # legitimate instance check pattern, not the misuse this rule was designed for.
    active: false

# Detekt's ktlint-wrapping ruleset. Most rules read settings (indentSize, max line length,
# etc.) from .editorconfig like standalone ktlint does — so the per-project indent of 2 lives
# in .editorconfig and applies to both the standalone ktlint-gradle plugin and to detekt here.
formatting:
  Indentation:
    # ktlint-gradle (the standalone plugin) and detekt-formatting bundle different ktlint
    # versions that disagree on continuation-indent edge cases. ktlint-gradle wins for
    # formatting (it has the auto-fix task); detekt-formatting only enforces. Leave this rule
    # off here to avoid version-drift noise — `indentSize: 2` is preserved below as the
    # project's documented intent for any tool that reads detekt's YAML.
    active: false
    indentSize: 2

style:
  MaxLineLength:
    # Aligned with ktlint's default of 120 (set in .editorconfig). ktlint enforces; this is a
    # safety net for files ktlint somehow misses.
    active: true
    maxLineLength: 120
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: true
  ReturnCount:
    # Multiple early-returns are idiomatic in Ktor route handlers (validate-and-bail patterns).
    excludeGuardClauses: true
    max: 5
  MagicNumber:
    # Crypto code is full of legitimate byte/bit-count literals (12-byte GCM IV, 32-byte AES key,
    # 16-byte HMAC, etc.). They're not really "magic" — they're protocol constants. Permit the
    # common power-of-2 sizes and a few round timing/limit values; defer to code review for
    # the rest.
    ignoreNumbers: ['-1', '0', '1', '2', '4', '7', '8', '12', '14', '16', '32', '64', '100', '128', '256', '1000', '1024']
    ignoreHashCodeFunction: true
    ignoreEnums: true
    ignoreNamedArgument: true
    ignoreLocalVariableDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
  ForbiddenImport:
    # We rely on Kotlin's built-in `assert(...)` instead of kotlin.test.assert* because
    # power-assert (kotlin.assert in our config) decomposes the boolean expression and prints
    # the values of each subexpression on failure — far better diagnostics than typed asserts.
    # See `powerAssert { functions = listOf("kotlin.assert") }` in each module's build script.
    active: true
    imports:
      - value: 'kotlin.test.assertEquals'
        reason: 'Use `assert(actual == expected)` — power-assert prints both sides on failure.'
      - value: 'kotlin.test.assertNotEquals'
        reason: 'Use `assert(a != b)` — power-assert prints both sides on failure.'
      - value: 'kotlin.test.assertTrue'
        reason: 'Use `assert(condition)` — power-assert decomposes the expression on failure.'
      - value: 'kotlin.test.assertFalse'
        reason: 'Use `assert(!condition)` — power-assert decomposes the expression on failure.'
      - value: 'kotlin.test.assertNull'
        reason: 'Use `assert(value == null)`.'
      - value: 'kotlin.test.assertNotNull'
        reason: 'Use `value ?: error("..."); /* now smart-cast non-null */` or `assert(value != null)`.'
      - value: 'kotlin.test.assertContains'
        reason: 'Use `assert(haystack.contains(needle))`.'
      - value: 'kotlin.test.fail'
        reason: 'Use `throw AssertionError("...")` or `error("...")`.'
