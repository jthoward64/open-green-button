# Project toolchain pins (mise-managed).
#
# Run `mise trust` once when you first cd into this repo, then `mise install`
# to download anything you don't already have.
#
# Why GraalVM for JDK 24 for everything:
#   A single JDK runs the Gradle daemon, satisfies the project's jvmToolchain(24) compile
#   target, and provides `native-image` + the tracing agent for :app:nativeCompile and
#   scripts/generate-native-metadata.sh. GraalVM for JDK 23+ is required to read the unified
#   `reachability-metadata.json` format that the bootable library bundles inside its jars
#   (GraalVM 21 silently ignores it). JDK 24 (not 25) also keeps Gradle 8.14 happy — it can't
#   yet run on the JDK 25 class-file format.
#
# Why pin Gradle 8.14.1:
#   Matches the wrapper version in gradle/wrapper/gradle-wrapper.properties. Keeping mise in
#   sync means a stray `gradle` command (without `./gradlew`) resolves to the same binary the
#   wrapper would download — no "two daemons competing for the build cache" surprises.

[tools]
java = "graalvm-community-24.0.2"
gradle = "8.14.1"

[env]
# The GraalVM Native Build Tools plugin auto-detects GraalVM from JAVA_HOME, but set GRAALVM_HOME
# explicitly too so scripts/generate-native-metadata.sh and the plugin find it unambiguously.
GRAALVM_HOME = "{{ env.HOME }}/.local/share/mise/installs/java/graalvm-community-24.0.2"
